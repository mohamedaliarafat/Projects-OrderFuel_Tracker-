workflows:
  ios-app-store-release:
    name: iOS App Store Release
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: albuhairaalarabianipras

    environment:
      flutter: 3.38.3
      xcode: latest
      cocoapods: default

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.albuhaira.nipras

      vars:
        XCODE_WORKSPACE: Runner.xcworkspace
        XCODE_SCHEME: Runner
        APP_STORE_APPLE_ID: "8105356752"

    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - ~/.pub-cache
        - ~/Library/Caches/CocoaPods

    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Generate iOS app icons
        script: |
          chmod +x scripts/generate_ios_app_icons.sh
          ./scripts/generate_ios_app_icons.sh

      - name: Install CocoaPods dependencies
        script: |
          find ios -name "Podfile" -execdir pod install \;

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build signed IPA
        script: |
          set -e

          PUBSPEC_BUILD_NUMBER=$(grep '^version:' pubspec.yaml | sed -E 's/.*\+([0-9]+)$/\1/')
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID" || true)

          if [ -n "$LATEST_BUILD_NUMBER" ]; then
            NEXT_BUILD_NUMBER=$(($LATEST_BUILD_NUMBER + 1))
          else
            NEXT_BUILD_NUMBER="${PUBSPEC_BUILD_NUMBER:-1}"
          fi

          echo "Using iOS build number: $NEXT_BUILD_NUMBER"

          flutter build ipa --release --build-number="$NEXT_BUILD_NUMBER"

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers