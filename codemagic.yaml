workflows:
  ios-app-store-release:
    name: iOS App Store Release
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: albuhairaalarabianipras

    environment:
      flutter: 3.38.3
      xcode: latest
      cocoapods: default

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.albuhaira.nipras

      vars:
        XCODE_WORKSPACE: Runner.xcworkspace
        XCODE_SCHEME: Runner
        APP_STORE_APPLE_ID: "6759683802"

    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - ~/.pub-cache
        - ~/Library/Caches/CocoaPods

    scripts:
      - name: Get Flutter packages
        script: |
          flutter clean
          flutter pub get

      - name: Generate iOS app icons
        script: |
          chmod +x scripts/generate_ios_app_icons.sh
          ./scripts/generate_ios_app_icons.sh

      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod install
          cd ..

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build signed IPA
        script: |
          set -e

          PUBSPEC_BUILD_NUMBER=$(grep '^version:' pubspec.yaml | sed -E 's/.*\+([0-9]+)$/\1/')
          # IMPORTANT:
          # - App Store "live" build numbers can lag behind TestFlight uploads.
          # - Using the App Store build number can cause duplicate CFBundleVersion uploads.
          # Prefer TestFlight build numbers when available.
          LATEST_TESTFLIGHT_BUILD_NUMBER="$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || true)"
          LATEST_APP_STORE_BUILD_NUMBER="$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || true)"

          LATEST_BUILD_NUMBER=""
          if [ -n "$LATEST_TESTFLIGHT_BUILD_NUMBER" ]; then
            LATEST_BUILD_NUMBER="$LATEST_TESTFLIGHT_BUILD_NUMBER"
          elif [ -n "$LATEST_APP_STORE_BUILD_NUMBER" ]; then
            LATEST_BUILD_NUMBER="$LATEST_APP_STORE_BUILD_NUMBER"
          fi

          LATEST_CANDIDATE=0
          PUBSPEC_CANDIDATE=0

          if echo "$LATEST_BUILD_NUMBER" | grep -Eq '^[0-9]+$'; then
            LATEST_CANDIDATE=$((LATEST_BUILD_NUMBER + 1))
          fi
          if echo "$PUBSPEC_BUILD_NUMBER" | grep -Eq '^[0-9]+$'; then
            PUBSPEC_CANDIDATE="$PUBSPEC_BUILD_NUMBER"
          fi

          NEXT_BUILD_NUMBER="$LATEST_CANDIDATE"
          if [ "$PUBSPEC_CANDIDATE" -gt "$NEXT_BUILD_NUMBER" ]; then
            NEXT_BUILD_NUMBER="$PUBSPEC_CANDIDATE"
          fi

          if [ "$NEXT_BUILD_NUMBER" -le 0 ]; then
            NEXT_BUILD_NUMBER="$(date +%s)"
          fi

          echo "Using iOS build number: $NEXT_BUILD_NUMBER"

          flutter build ipa --release \
            --build-number="$NEXT_BUILD_NUMBER" \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      app_store_connect:
        auth: integration
