<!DOCTYPE html>
<html lang="ar">

<head>
  <!-- Base URL (Flutter) -->
  <base href="$FLUTTER_BASE_HREF">

  <!-- Basic Meta -->
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">

  <!-- Title -->
  <title>نظام نبراس لإدارة وتتبع الطلبات | شركة البحيرة العربية</title>

  <!-- Meta Description -->
  <meta name="description"
    content="نظام نبراس من شركة البحيرة العربية لإدارة وتتبع طلبات الوقود، الإشراف على العمليات، وتحسين كفاءة التوزيع في الوقت الحقيقي.">

  <meta name="robots" content="index, follow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- PWA -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="نظام نبراس">

  <!-- Icons -->
  <link rel="icon" type="image/png" sizes="48x48" href="/favicon.png">
  <link rel="icon" type="image/png" sizes="96x96" href="/favicon.png">
  <link rel="apple-touch-icon" sizes="192x192" href="/icons/Icon-192.png">

  <!-- Manifest -->
  <link rel="manifest" href="/manifest.json">

  <!-- Force HTML renderer -->
  <meta name="flutter-web-renderer" content="html">

  <script>
    window.flutterWebRenderer = "html";
  </script>

  <!-- Google Maps Map ID -->
  <script>
    window.GOOGLE_MAPS_MAP_ID = "91aedc28da83b4c9d9692050";
    window.__googleMapsLoadState = "loading";
    window.__googleMapsLoadError = "";
    window.gm_authFailure = function () {
      window.__googleMapsLoadState = "auth_failure";
      window.__googleMapsLoadError =
        "Google Maps authentication failed. Check the API key, referrer restrictions, and billing.";
    };
  </script>

  <!-- Google Maps JS -->
  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCayUZhpM7kmI4rxeg-URtOBjk5137XLS4&v=weekly&libraries=marker&map_ids=91aedc28da83b4c9d9692050"
    onload="window.__googleMapsLoadState = (window.google && window.google.maps) ? 'ready' : 'loaded_no_maps'; if (window.__googleMapsLoadState !== 'ready' && !window.__googleMapsLoadError) { window.__googleMapsLoadError = 'Google Maps script loaded but google.maps is unavailable.'; }"
    onerror="window.__googleMapsLoadState = 'load_error'; window.__googleMapsLoadError = 'Failed to load Google Maps JavaScript API.';">
  </script>
  <script>
    document.addEventListener('contextmenu', function (event) {
      event.preventDefault();
    }, { capture: true });

    document.addEventListener('keydown', function (event) {
      const isKeyboardContextMenu =
        event.key === 'ContextMenu' || (event.shiftKey && event.key === 'F10');

      if (isKeyboardContextMenu) {
        event.preventDefault();
        event.stopPropagation();
      }
    }, { capture: true });
  </script>

</head>

<body>

  <!-- Firebase is initialized by flutterfire in Dart (avoid duplicate app init) -->

  <!-- Firebase Messaging Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/firebase-messaging-sw.js');
      });
    }
  </script>

  <!-- Flutter bootstrap -->
  <script src="flutter_bootstrap.js" async></script>

</body>

</html>
