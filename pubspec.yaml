name: order_tracker
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.6
  http: ^1.6.0
  provider: ^6.0.5
  shared_preferences: ^2.2.2
  intl: ^0.20.2

  # PDF & Files
  flutter_pdfview: ^1.3.1
  pdf: ^3.11.3
  printing: ^5.11.2
  image_picker: ^1.2.1
  file_picker: ^10.3.8
  path_provider: ^2.1.0
  path: ^1.8.3

  syncfusion_flutter_gauges: ^32.1.20

  # Networking
  dio: ^5.3.2

  # UI & Forms
  flutter_form_builder: ^10.2.0
  form_builder_validators: ^11.2.0
  dropdown_button2: ^2.0.0
  data_table_2: ^2.4.1
  flutter_svg: ^2.0.10
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  flutter_typeahead: ^5.2.0
  pointer_interceptor: ^0.10.1
  pull_to_refresh: ^2.0.0
  table_calendar: ^3.0.10
  fluttertoast: ^9.0.0
  animated_splash_screen: ^1.3.0

  # Notifications
  flutter_local_notifications: ^19.5.0

  # Syncfusion (Charts + DataGrid + DatePicker + PDF)
  syncfusion_flutter_charts: ^32.1.20
  syncfusion_flutter_datagrid: ^32.1.20
  syncfusion_flutter_datepicker: ^32.1.20
  syncfusion_flutter_pdf: ^32.1.20

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
