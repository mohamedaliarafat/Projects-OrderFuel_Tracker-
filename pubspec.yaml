name: order_tracker
description: "شركة البحيرة العربية للنقليات "
publish_to: "none"

version: 12.0.1+16

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.6
  http: ^1.6.0
  provider: ^6.0.5
  shared_preferences: ^2.2.2
  intl: ^0.20.2
  video_player: ^2.10.1
  video_player_web: ^2.4.0
  fl_chart: ^1.1.1

  geolocator: ^14.0.2
  google_maps_flutter: ^2.14.2
  url_launcher: ^6.1.14
  webview_flutter: ^4.8.0
  web: ^1.1.1
  syncfusion_flutter_maps: ^32.2.4
  html: ^0.15.6

  # PDF & Files
  flutter_pdfview: ^1.3.1
  pdf: ^3.11.3
  printing: ^5.11.2
  image_picker: ^1.2.1
  file_picker: ^10.3.8
  path_provider: ^2.1.0
  path: ^1.8.3
  syncfusion_flutter_gauges: ^32.1.20
  photo_view: ^0.15.0
  speech_to_text: ^7.3.0

  # Networking
  dio: ^5.3.2

  # UI & Forms
  flutter_form_builder: ^10.2.0
  form_builder_validators: ^11.2.0
  dropdown_button2: ^2.0.0
  data_table_2: ^2.4.1
  flutter_svg: ^2.0.10
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  flutter_typeahead: ^5.2.0
  pointer_interceptor: ^0.10.1
  pull_to_refresh: ^2.0.0
  table_calendar: ^3.0.10
  fluttertoast: ^9.0.0
  animated_splash_screen: ^1.3.0
  firebase_storage: ^13.0.6
  firebase_core: ^4.4.0
  firebase_messaging: 16.1.1
  firebase_messaging_web: ^4.0.0

  # Notifications
  flutter_local_notifications: ^19.5.0
  record: ^5.0.5
  just_audio: ^0.9.36

  # Syncfusion (Charts + DataGrid + DatePicker + PDF)
  syncfusion_flutter_charts: ^32.1.20
  syncfusion_flutter_datagrid: ^32.1.20
  syncfusion_flutter_datepicker: ^32.1.20
  syncfusion_flutter_pdf: ^32.1.20
  syncfusion_flutter_xlsio: ^32.1.23

  open_file: ^3.5.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

  assets:
    - assets/nibras_page.html
    - assets/images/
    - assets/videos/
    - assets/icons/
    - assets/fonts/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/icon-app.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#0046FF" 
  adaptive_icon_foreground: "assets/icons/icon-app.png"


dependency_overrides:
  record_linux:
    path: third_party/record_linux
